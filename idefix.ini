[Grid]
X1-grid         1   4.0     64     l    40.0
X2-grid         1   0.0     128     u    3.1415926535897932

[TimeIntegrator]
CFL             0.5
tstop           75400.1
max_runtime     1.75
nstages         3

[Hydro]
solver          hllc
csiso           userdef
viscosity       explicit    userdef

[Gravity]
potential       userdef

[Boundary]
X1-beg          outflow
X1-end          outflow
X2-beg          axis
X2-end          axis

[Setup]
epsilon         0.05
alpha           0.001
densityFloor    1e-9
gravity         Kepler
tilt            0
spin            1.0

[Output]
uservar         InvDt
vtk             50.0
vtk_dir         output/vtk
dmp             1000.0
dmp_dir         output/dmp
log             100
analysis        10.0
